name: Deploy to Amazon EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React Frontend
        working-directory: ./client/apps/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm ci && npm run build
      
      - name: Debug EC2_HOST
        run: |
          echo "EC2_HOST length: ${#EC2_HOST}"
          echo "EC2_HOST value: '$EC2_HOST'"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      - name: Test SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/test_key.pem # lưu key vào file tạm
          chmod 600 /tmp/test_key.pem # đảm bảo quyền truy cập đúng cho key
          ssh-keygen -l -f /tmp/test_key.pem  # in ra fingerprint nếu key hợp lệ
          rm /tmp/test_key.pem # xóa file sau khi kiểm tra

      - name: Preflight SSH connectivity
        run: |
          echo "Checking TCP connectivity to ${EC2_HOST}:${EC2_PORT}..."
          nc -zv -w 10 "$EC2_HOST" "$EC2_PORT"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}

      - name: Upload frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT || '22' }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          source: "client/apps/web/dist/*"
          target: "/tmp/frontend-build"
          strip_components: 4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT || '22' }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            set -e
            cd ~/app/Mock-Interview-App && git pull origin main

            # Build NestJS
            cd ~/app/Mock-Interview-App/server
            npm ci --production=false
            npm run build
            pm2 restart nestjs-api

            # Update code-runner nếu có thay đổi
            cd ~/app/Mock-Interview-App
            docker compose -f docker-compose.prod.yml build --no-cache code-runner
            docker compose -f docker-compose.prod.yml up -d

            # Update frontend
            sudo cp -r /tmp/frontend-build/* /var/www/mock-interview/
            sudo chown -R www-data:www-data /var/www/mock-interview/
            sudo systemctl reload nginx

            echo "Deploy thành công!"
            pm2 status
