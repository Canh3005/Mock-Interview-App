version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mock-interview-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mock_interview_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: mock-interview-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: always

  # ─── Custom Code Runner (Judge0-compatible API) ──────────────────────────────
  # Replaces Judge0 + isolate which doesn't work on Docker Desktop for Windows
  # (because isolate requires cgroup v1, but Docker Desktop uses cgroup v2)
  code-runner:
    build:
      context: ./code-runner
      dockerfile: Dockerfile
    container_name: mock-interview-code-runner
    ports:
      - "2358:2358"
    restart: always
    environment:
      NODE_ENV: production

  redis:
    image: redis:7.2.4
    container_name: mock-interview-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # ─── Judge0 (disabled - isolate incompatible with Docker Desktop/Windows) ──
  #
  # judge0-server:
  #   image: judge0/judge0:1.13.1
  #   container_name: mock-interview-judge0-server
  #   volumes:
  #     - ./judge0.conf:/judge0.conf:ro
  #   ports:
  #     - "2358:2358"
  #   privileged: true
  #   restart: always
  #
  # judge0-worker:
  #   image: judge0/judge0:1.13.1
  #   container_name: mock-interview-judge0-worker
  #   command: ["./scripts/workers"]
  #   volumes:
  #     - ./judge0.conf:/judge0.conf:ro
  #   privileged: true
  #   restart: always

volumes:
  postgres_data:
  redis_data:
